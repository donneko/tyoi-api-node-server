<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Tyoi Starter</title>
        <link rel="stylesheet" href="./src/style/init.css" />
        <link rel="stylesheet" href="./src/style/index.css" />

        <link rel="icon" href="./src/icon/favicon.webp" />
        <script type="module" src="./src/script/index.js"></script>
    </head>
    <body>
        <header class="header">
            <h1 class="header-title">tyoi-server</h1>
        </header>
        <main class="main">
            <section class="main-section main-hero">
                <div class="main-hero-title">
                    <p class="main-hero-title-text">Tyoi Starter</p>
                    <p class="main-hero-title-description">
                        Small local API and static file server framework.
                    </p>
                </div>
                <div class="main-hero-status">
                    <span class="main-hero-status-icon">●</span>
                    <p class="main-hero-status-text">Server is Running</p>
                </div>
            </section>
            <section class="main-section main-info">
                <div class="main-section-header">
                    <span class="main-section-header-icon">●</span>
                    <h2 class="main-section-header-title">API playground</h2>
                </div>
                <div class="main-section-main">
                    <button id="hello-button" type="button">GET /api/hello</button>
                    <pre id="api-result">ボタンを押すと API の応答が表示されます。</pre>
                </div>
            </section>

            <section class="main-section main-note">
                <div class="main-section-header">
                    <span class="main-section-header-icon">!</span>
                    <h2 class="main-section-header-title">WebSocket</h2>
                </div>
                <div class="main-section-main">
                    <p id="ws-status">Connecting...</p>
                    <form id="ws-form">
                        <input id="ws-message" value="Hello WebSocket" aria-label="Message" />
                        <button type="submit">Send</button>
                    </form>
                    <pre id="ws-result"></pre>
                </div>
            </section>
        </main>
    </body>
</html>
